newlines = lf
input_tab_size = 4
output_tab_size = 4

cmt_width = 120
cmt_reflow_mode = 2
cmt_indent_multi = true
cmt_c_group = true
cmt_star_cont = true
cmt_sp_before_star_cont = 1
cmt_sp_after_star_cont = 1

indent_columns = 4
indent_with_tabs = 0
sp_arith = add
sp_assign = add
sp_compare = add

nl_fcall_brace = ignore
nl_if_brace = ignore
nl_for_brace = ignore
nl_while_brace = ignore
nl_switch_brace = ignore
nl_func_type_name = ignore
nl_func_type_name_class = ignore

mod_full_brace_if = 0
mod_full_brace_for = 0
mod_full_brace_while = 0
mod_paren_on_return = ignore